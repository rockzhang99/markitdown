<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarkItDown:PDF、DOCX、PPTX、XLSX、HTML、CSV、JSON、XML、ZIP、EPUB、IPYNB、MSG等格式转换为 Markdown</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header__inner">
                <svg class="header__icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
                <h1 class="header__title">MarkItDown</h1>
                <button id="contactBtn" class="btn btn--contact" title="Contact Author">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <span data-i18n="contactAuthor">联系作者</span>
                </button>
                <button id="langToggle" class="btn btn--lang" title="Switch Language">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <span>中文</span>
                </button>
                <a href="https://github.com/rockzhang99/markitdown" class="btn btn--github" title="GitHub" target="_blank" rel="noopener">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    GitHub
                </a>
                <a href="https://pub-e612e869d3b1475bbff4637b6351fee7.r2.dev/%E8%BD%AC%E6%8D%A2%E4%B8%BAMarkdown%E6%A0%BC%E5%BC%8F%20Setup%201.0.0.exe" class="btn btn--download" title="Download Desktop App">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Desktop App
                </a>
            </div>
        </header>

        <main class="main">
            <!-- Upload Section -->
            <section class="upload-section">
                <div id="dropZone" class="drop-zone">
                    <svg class="drop-zone__icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p class="drop-zone__text" data-i18n="dropText">Drop your file here</p>
                    <p class="drop-zone__hint"><span data-i18n="dropOr">or</span> <button type="button" class="drop-zone__browse" data-i18n="dropBrowse">browse files</button></p>
                    <input type="file" id="fileInput" hidden
                        accept=".pdf,.docx,.pptx,.xlsx,.xls,.html,.htm,.csv,.json,.xml,.zip,.epub,.ipynb,.msg">
                </div>

                <div id="fileInfo" class="file-info" hidden>
                    <svg class="file-info__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                        <polyline points="13 2 13 9 20 9"/>
                    </svg>
                    <span class="file-info__name"></span>
                    <span class="file-info__size"></span>
                    <button type="button" class="file-info__remove" title="Remove file" data-i18n-title="removeFile">&times;</button>
                </div>

                <button id="convertBtn" class="btn btn--primary" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 16 12 12 8 16"/>
                        <line x1="12" y1="12" x2="12" y2="21"/>
                        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
                    </svg>
                    <span data-i18n="convert">Convert to Markdown</span>
                </button>
            </section>

            <!-- Loading -->
            <div id="loader" class="loader" hidden>
                <div class="loader__spinner"></div>
                <p class="loader__text" data-i18n="converting">Converting your document...</p>
            </div>

            <!-- Error -->
            <div id="error" class="error-message" hidden>
                <svg class="error-message__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <span class="error-message__text"></span>
                <button type="button" class="error-message__dismiss" title="Dismiss" data-i18n-title="dismiss">&times;</button>
            </div>

            <!-- Output Section -->
            <section id="output" class="output-section" hidden>
                <div class="output-header">
                    <div class="output-tabs">
                        <button class="tab tab--active" data-tab="preview" data-i18n="tabPreview">Preview</button>
                        <button class="tab" data-tab="raw" data-i18n="tabRaw">Raw Markdown</button>
                    </div>
                    <div class="output-actions">
                        <button id="copyBtn" class="btn btn--secondary btn--sm">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                            <span data-i18n="copy">Copy</span>
                        </button>
                        <button id="saveBtn" class="btn btn--secondary btn--sm">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            <span data-i18n="save">Save .md</span>
                        </button>
                        <button id="clearBtn" class="btn btn--ghost btn--sm"><span data-i18n="convertAnother">Convert Another</span></button>
                    </div>
                </div>
                <div class="output-content">
                    <div id="previewPane" class="output-pane markdown-body"></div>
                    <div id="rawPane" class="output-pane" hidden>
                        <pre><code id="rawContent"></code></pre>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p data-i18n="supported">Supported: PDF, DOCX, PPTX, XLSX, HTML, CSV, JSON, XML, ZIP, EPUB</p>
            <p class="footer__note">Images & Audio: Install <a href="https://github.com/UB-Mannheim/tesseract/wiki" target="_blank">Tesseract</a> + <code>pip install pytesseract</code> to enable OCR</p>
            <p class="footer__credit"><span data-i18n="poweredBy">Powered by</span> <a href="https://github.com/microsoft/markitdown" target="_blank" rel="noopener">Microsoft MarkItDown</a></p>
        </footer>
    </div>
    <script src="/static/script.js"></script>

    <!-- WeChat QR Code Modal -->
    <div id="wechatModal" class="modal" hidden>
        <div class="modal__overlay"></div>
        <div class="modal__content">
            <button class="modal__close" title="Close">&times;</button>
            <h3 class="modal__title" data-i18n="scanWechat">扫码加微信</h3>
            <img src="/static/wechat.png" alt="WeChat QR Code" class="modal__qr">
            <p class="modal__hint" data-i18n="wechatHint">扫描二维码添加作者微信</p>
        </div>
    </div>
</body>
</html>
